name: Docker Build, Push and Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Run tests
        run: |
          dotnet restore
          dotnet test --verbosity normal

  build-and-push:
    name: Build and Push Docker Image
    - name: Test container healthcheck
    run: |
    # Запускаем контейнер с собранным образом
    docker run -d -p 8080:8080 --name test-api ${{ steps.meta.outputs.tags }}
    # Ждём 10 секунд, чтобы приложение и healthcheck запустились
    sleep 10
    # Показываем статус контейнера (должен быть healthy)
    docker ps --filter "name=test-api" --format "table {{.Status}}"
    # Останавливаем и удаляем контейнер
    docker stop test-api
    docker rm test-api
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update project version from tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/v}
          sed -i "s/<Version>.*<\/Version>/<Version>$TAG_NAME<\/Version>/" MyFirstCI.Api/MyFirstCI.Api.csproj
      - name: Commit version update
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add MyFirstCI.Api/MyFirstCI.Api.csproj
            git diff --cached --quiet || git commit -m "Update project version to ${{ github.ref_name }}"
            git push origin HEAD:main
      - name: Build application for release
        run: |
          dotnet restore
          dotnet publish MyFirstCI.Api/MyFirstCI.Api.csproj -c Release -o ./publish-release --self-contained false -p:PublishSingleFile=false
      - name: Create release archives
        run: |
          tar -czf my-app-release.tar.gz -C ./publish-release .
          zip -r my-app-release.zip ./publish-release/*
      - name: Generate release notes from tag
        id: release_notes
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          RELEASE_NOTES=$(git tag -l --format='%(contents)' "$TAG_NAME")
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release $TAG_NAME"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Determine prerelease status
        id: prerelease
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          if [[ "$TAG_NAME" =~ -(beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: |
            my-app-release.tar.gz
            my-app-release.zip
          tag_name: ${{ github.ref_name }}